{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %} {% endblock %}</title>
    <meta name="author" content="Корочки.есть">
    <meta name="description" content="Платформа для подачи заявок на курсы и управления ими">
    <meta name="keywords" content="курсы, обучение, заявки, Корочки.есть, образование">


    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="header">
    <nav class="nav container">
        <div class="nav-left">
            <a href="{% url 'home' %}" class="logo">
                <span>Корочки.есть</span>
            </a>
        </div>

        <div class="nav-right">
            {% if user.is_authenticated %}
                {% if user.is_superuser %}
                    <a href="{% url 'admin_panel' %}" class="nav-link">Админ</a>
                {% endif %}
                <a href="{% url 'application_create' %}" class="nav-link">Подать заявку</a>
                <a href="{% url 'application' %}" class="nav-link">Мои заявки</a>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Выйти</a>
            {% else %}
                <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Регистрация</a>
                <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Вход</a>
            {% endif %}
        </div>
    </nav>
</header>

<main class="main container">
    {% block content %}
    {% endblock %}
</main>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
